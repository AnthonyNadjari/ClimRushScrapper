name: ClimRush Scraper

on:
  workflow_dispatch:

concurrency:
  group: scraper-run
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      count: ${{ steps.set-matrix.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - id: set-matrix
        run: python scripts/prepare_matrix.py

  scrape:
    needs: prepare
    if: needs.prepare.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
      max-parallel: 16
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-${{ runner.os }}-v1

      - name: Install deps
        run: |
          pip install playwright openpyxl
          playwright install chromium --with-deps

      - name: Scrape segment "${{ matrix.name }}"
        run: |
          python -m scraper.engine \
            --config config/segments.json \
            --segment-index ${{ matrix.index }} \
            --output-dir output/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: segment-${{ matrix.index }}
          path: output/
          retention-days: 30

  merge:
    needs: [prepare, scrape]
    if: always() && needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install openpyxl

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: segment-*

      - name: List artifacts
        run: find artifacts/ -name "*.csv" | sort

      - name: Merge into Excel + JSON
        run: python -m scraper.merge --input-dir artifacts/ --output-dir results/

      - name: Commit results
        run: |
          git config user.name "ClimRush Bot"
          git config user.email "bot@climrush.local"
          git add results/
          git commit -m "Update results $(date -u +%Y-%m-%dT%H:%M:%SZ) - $(cat results/latest.json | python3 -c 'import sys,json; print(json.load(sys.stdin)["total_leads"])' 2>/dev/null || echo '?') leads" || echo "No changes"
          git pull --rebase origin main || true
          git push
