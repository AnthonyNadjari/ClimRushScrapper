name: ClimRush Scraper

on:
  workflow_dispatch:
    inputs:
      config:
        description: 'JSON config (base64 encoded, optional)'
        required: false
        type: string
  push:
    paths:
      - 'config/segments.json'

concurrency:
  group: scraper-run
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      count: ${{ steps.set-matrix.outputs.count }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - id: set-matrix
        env:
          INPUT_CONFIG: ${{ github.event.inputs.config || '' }}
          CONFIG_PATH: config/segments.json
        run: python scripts/prepare_matrix.py

  scrape:
    needs: prepare
    if: needs.prepare.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install playwright openpyxl
          playwright install chromium --with-deps

      - name: Run scraper for segment ${{ matrix.name }}
        run: |
          python -m scraper.engine \
            --config config/segments.json \
            --segment-index ${{ matrix.index }} \
            --output-dir output/

      - name: Upload segment results
        uses: actions/upload-artifact@v4
        with:
          name: segment-${{ matrix.index }}
          path: output/
          retention-days: 30

  merge:
    needs: [prepare, scrape]
    if: always() && needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install openpyxl
        run: pip install openpyxl

      - name: Download all segment artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: segment-*

      - name: List artifacts
        run: find artifacts/ -type f -name "*.csv" | head -50

      - name: Merge segments into Excel + JSON
        run: python -m scraper.merge --input-dir artifacts/ --output-dir results/

      - name: Commit results
        run: |
          git config user.name "ClimRush Bot"
          git config user.email "bot@climrush.local"
          git add results/
          git commit -m "Update results $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push
